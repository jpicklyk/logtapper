meta:
  id: "wlan-disconnect-events"
  name: "WLAN Disconnect Events"
  version: "1.0.0"
  author: "LogTapper"
  description: "Captures WiFi disconnection and deauthentication events from Android logcat and kernel logs. Extracts IEEE 802.11 reason codes, locally-generated (LG) flags, and BSSID/SSID context."
  tags: ["wifi", "network", "wlan", "disconnect", "android"]

vars:
  - name: total_disconnects
    type: int
    default: 0
    display: true
    label: "Total Disconnects"

  - name: locally_generated
    type: int
    default: 0
    display: true
    label: "Locally Generated"

  - name: remote_deauth
    type: int
    default: 0
    display: true
    label: "Remote Deauth"

  - name: reason_counts
    type: map
    default: {}
    display: true
    label: "Reason Codes"
    display_as: table
    columns: ["reason", "count"]

  - name: event_type_counts
    type: map
    default: {}
    display: true
    label: "Event Types"
    display_as: table
    columns: ["event_type", "count"]

pipeline:
  - stage: filter
    rules:
      - type: message_contains_any
        values:
          - "disconnectedstate enter"
          - "DisconnectedState"
          - "DISCONNECTING"
          - "DEAUTH_LEAVING"
          - "WLAN_REASON_"
          - "Disconnect reason:"
          - "disconnected, bssid"
          - "wlan0: deauthenticating"
          - "CMD_START_CONNECT"
          - "Connection attempt"
          - "Network disconnected"
          - "NETWORK_DISCONNECTION_EVENT"

  - stage: extract
    fields:
      - name: reason_code
        pattern: 'WLAN_REASON_(\w+)'
        cast: string
      - name: reason_num
        pattern: '[Dd]isconnect reason[=: ]+(\d+)'
        cast: int
      - name: lg_flag
        pattern: 'LG[=: ]+(\d)'
        cast: int
      - name: bssid
        pattern: 'bssid[=: ]+([0-9a-fA-F:]{17})'
        cast: string
      - name: ssid
        pattern: 'ssid[=: ]+"?([^"\s,]+)'
        cast: string

  - stage: script
    runtime: rhai
    src: |
      // Classify event type
      let msg = line.message;
      let event_type = "disconnect";

      if "DEAUTH_LEAVING" in msg || "deauthenticating" in msg {
        event_type = "deauth";
      } else if "DisconnectedState" in msg || "disconnectedstate enter" in msg {
        event_type = "state_change";
      } else if "CMD_START_CONNECT" in msg || "Connection attempt" in msg {
        event_type = "connect_attempt";
      } else if "DISCONNECTING" in msg {
        event_type = "disconnecting";
      }

      // Count total disconnects
      if event_type == "deauth" || event_type == "disconnect" || event_type == "state_change" {
        vars.total_disconnects += 1;
      }

      // Track locally-generated vs remote (only when lg_flag field was extracted)
      if "lg_flag" in fields {
        if fields.lg_flag == 1 {
          vars.locally_generated += 1;
        } else if event_type == "deauth" {
          vars.remote_deauth += 1;
        }
      }

      // Count by reason code string (e.g. DEAUTH_LEAVING)
      if "reason_code" in fields {
        let rc = fields.reason_code;
        let m = vars.reason_counts;
        if rc in m {
          m[rc] = m[rc] + 1;
        } else {
          m[rc] = 1;
        }
        vars.reason_counts = m;
      }

      // Count by event type
      let et = vars.event_type_counts;
      if event_type in et {
        et[event_type] = et[event_type] + 1;
      } else {
        et[event_type] = 1;
      }
      vars.event_type_counts = et;

      // Build reason label
      let reason = "unknown";
      if "reason_code" in fields {
        reason = fields.reason_code;
      } else if "reason_num" in fields {
        reason = "CODE_" + fields.reason_num.to_string();
      }

      let bssid = if "bssid" in fields { fields.bssid } else { "unknown" };
      let ssid  = if "ssid"  in fields { fields.ssid  } else { "unknown" };

      _emits.push(#{
        event_type: event_type,
        reason: reason,
        lg: if "lg_flag" in fields { fields.lg_flag } else { -1 },
        bssid: bssid,
        ssid: ssid,
        tag: line.tag,
      });

  - stage: output
    views:
      - type: table
        source: emissions
        columns: ["event_type", "reason", "lg", "ssid", "bssid", "tag"]
        sort: "event_type"
      - type: summary
        source: vars
        template: |
          {{total_disconnects}} disconnect events.
          Locally generated: {{locally_generated}} | Remote deauth: {{remote_deauth}}

    charts:
      - id: event_type_bar
        type: bar
        title: "Disconnect Events by Type"
        source: emissions
        x: { field: event_type, label: "Event Type" }
        y: { field: event_type, label: "Count", aggregation: count }

      - id: reason_bar
        type: bar
        title: "Disconnect Reasons (IEEE 802.11)"
        source: emissions
        x: { field: reason, label: "Reason" }
        y: { field: reason, label: "Count", aggregation: count }

      - id: timeline
        type: time_series
        title: "Disconnect Events Over Time"
        source: emissions
        x: { field: timestamp, label: "Time" }
        y: { field: event_type, label: "Events", aggregation: count }

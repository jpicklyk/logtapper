type: state_tracker
id: wlan-disconnect-tracker
name: WLAN Disconnect Tracker
version: 1.2.0
author: LogTapper
description: "Tracks WiFi connection state with focus on disconnection events. Captures IEEE 802.11 reason codes, locally-generated flags, and BSSID from wpa_supplicant CTRL-EVENT logcat messages and WifiClientModeImpl/SemClientModeImpl state logs."
tags: [wifi, network, wlan, disconnect, android]

group: Network

state:
  - name: connection_state
    type: string
    default: "unknown"
  - name: last_reason
    type: string
    default: ""
  - name: locally_generated
    type: string
    default: ""
  - name: bssid
    type: string
    default: ""

transitions:
  # ── wpa_supplicant CTRL-EVENT logcat messages ──────────────────────────────
  # These are the most reliable source: tagged logcat entries from the
  # wpa_supplicant daemon, available in both ADB streams and bugreports.
  # Most-specific patterns first (locally_generated=1/0 before generic).

  - name: Disconnected (local, wpa_supplicant)
    filter:
      message_regex: 'CTRL-EVENT-DISCONNECTED bssid=([0-9a-fA-F:]{17}).*locally_generated=1'
    set:
      connection_state: "disconnecting"
      bssid: $1
      locally_generated: "yes"

  - name: Disconnected (remote, wpa_supplicant)
    filter:
      message_regex: 'CTRL-EVENT-DISCONNECTED bssid=([0-9a-fA-F:]{17}).*locally_generated=0'
    set:
      connection_state: "disconnecting"
      bssid: $1
      locally_generated: "no"

  - name: Disconnected (wpa_supplicant, no LG)
    filter:
      message_regex: 'CTRL-EVENT-DISCONNECTED bssid=([0-9a-fA-F:]{17})'
    set:
      connection_state: "disconnecting"
      bssid: $1

  - name: Connected (wpa_supplicant)
    filter:
      message_regex: 'CTRL-EVENT-CONNECTED.*([0-9a-fA-F:]{17})'
    set:
      connection_state: "connected"
      bssid: $1
      last_reason: ""
      locally_generated: ""

  # ── IEEE 802.11 reason codes — most-specific first ────────────────────────
  # Samsung HDD driver format: "WLAN_REASON_DEAUTH_LEAVING vendor: 0  LG: 1"
  # Note: "LG: 1" has a space after the colon.

  - name: Deauth (local, named reason)
    filter:
      message_regex: 'WLAN_REASON_(\w+).*LG: 1'
    set:
      connection_state: "disconnecting"
      last_reason: $1
      locally_generated: "yes"

  - name: Deauth (remote, named reason)
    filter:
      message_regex: 'WLAN_REASON_(\w+).*LG: 0'
    set:
      connection_state: "disconnecting"
      last_reason: $1
      locally_generated: "no"

  - name: Deauth (named reason, no LG)
    filter:
      message_regex: 'WLAN_REASON_(\w+)'
    set:
      connection_state: "disconnecting"
      last_reason: $1

  - name: Deauth (numeric reason)
    filter:
      message_regex: '[Dd]isconnect reason[=: ]+(\d+)'
    set:
      connection_state: "disconnecting"
      last_reason: $1

  # ── State machine transitions ──────────────────────────────────────────────

  - name: Disconnected (AOSP)
    filter:
      tag: WifiClientModeImpl
      message_regex: '(?i)disconnectedstate.enter'
    set:
      connection_state: "disconnected"

  - name: Disconnected (Samsung)
    filter:
      tag: SemClientModeImpl
      message_regex: '(?i)disconnectedstate.enter'
    set:
      connection_state: "disconnected"

  - name: Disconnected (network event)
    filter:
      message_contains: "NETWORK_DISCONNECTION_EVENT"
    set:
      connection_state: "disconnected"

  - name: Disconnected (Samsung high-level)
    filter:
      tag: SemWifiApAdvancedAutohotspotService
      message_contains: "CMD_WIFI_DISCONNECTED"
    set:
      connection_state: "disconnected"
      last_reason: ""
      locally_generated: ""

  # ── Reconnect attempt ──────────────────────────────────────────────────────

  - name: Connecting (AOSP)
    filter:
      tag: WifiClientModeImpl
      message_contains: "CMD_START_CONNECT"
    set:
      connection_state: "connecting"

  - name: Connecting (Samsung)
    filter:
      tag: SemClientModeImpl
      message_contains: "CMD_START_CONNECT"
    set:
      connection_state: "connecting"

  # ── L2 connected (fallback if wpa_supplicant CTRL-EVENT not present) ───────

  - name: L2 Connected (AOSP)
    filter:
      tag: WifiClientModeImpl
      message_regex: '(?i)l2connectedstate.enter'
    set:
      connection_state: "connected"
      last_reason: ""
      locally_generated: ""

  - name: L2 Connected (Samsung)
    filter:
      tag: SemClientModeImpl
      message_regex: '(?i)l2connectedstate.enter'
    set:
      connection_state: "connected"
      last_reason: ""
      locally_generated: ""

  - name: Connected (Samsung high-level)
    filter:
      tag: SemWifiApAdvancedAutohotspotService
      message_contains: "CMD_WIFI_CONNECTED"
    set:
      connection_state: "connected"

output:
  timeline: true
  annotate: true

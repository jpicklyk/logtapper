name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Remove local cargo config (hardcoded MSVC linker path)
        if: matrix.platform == 'windows-latest'
        run: Remove-Item -Path .cargo/config.toml -Force
        shell: pwsh

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clear Windows-only npm overrides for cross-platform build
        if: matrix.platform != 'windows-latest'
        run: echo "" > .npmrc

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build MCP sidecar binary
        shell: bash
        run: |
          cd mcp-server
          bun install
          bun run build:binary

      - name: Rename MCP sidecar for Tauri target triple (Unix)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: mv mcp-server/dist/logtapper-mcp mcp-server/dist/logtapper-mcp-${{ matrix.target }}

      - name: Rename MCP sidecar for Tauri target triple (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: Move-Item -Path mcp-server/dist/logtapper-mcp.exe -Destination mcp-server/dist/logtapper-mcp-${{ matrix.target }}.exe

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_CONFIG: '{"bundle":{"externalBin":["../mcp-server/dist/logtapper-mcp"]}}'
        with:
          tagName: v__VERSION__
          releaseName: LogTapper v__VERSION__
          releaseBody: |
            See the assets below to download the installer for your platform.

            **Windows:** Download the `.exe` (NSIS installer) or `.msi`
            **macOS:** Download the `.dmg` (note: you may need to right-click > Open on first launch)
            **Linux:** Download the `.deb` or `.AppImage`
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

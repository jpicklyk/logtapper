name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup MSVC developer environment
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Remove Windows-only npm overrides for cross-platform CI
        if: matrix.platform != 'windows-latest'
        run: |
          sed -i '/^os=/d; /^cpu=/d' .npmrc || true

      - name: Remove Windows-only rollup dependency for cross-platform CI
        if: matrix.platform != 'windows-latest'
        run: |
          node -e "
            const pkg = require('./package.json');
            delete pkg.dependencies['@rollup/rollup-win32-x64-msvc'];
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: LogTapper v__VERSION__
          releaseBody: |
            See the assets below to download the installer for your platform.

            **Windows:** Download the `.exe` (NSIS installer) or `.msi`
            **macOS:** Download the `.dmg` (note: you may need to right-click > Open on first launch)
            **Linux:** Download the `.deb` or `.AppImage`
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

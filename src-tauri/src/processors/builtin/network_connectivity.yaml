type: state_tracker
id: __network_connectivity
name: Network Connectivity
version: 2.0.0
author: LogTapper
description: "Tracks network connectivity state: connected/disconnected and network type (WIFI, MOBILE, etc.). Uses ConnectivityService EVENT_NETWORK_INFO_CHANGED events from modern Android (6+)."
tags: [network, connectivity, android]
builtin: true

group: Network

state:
  - name: connected
    type: bool
  - name: network_type
    type: string

transitions:
  # Modern Android (6+) — ConnectivityService EVENT_NETWORK_INFO_CHANGED
  # Format: [<id> <TYPE>] EVENT_NETWORK_INFO_CHANGED, going from <OLD> to <NEW>
  # TYPE is WIFI, MOBILE, ETHERNET, etc.

  - name: Network Connected
    filter:
      tag: ConnectivityService
      message_regex: '\[\d+ (\w+)\] EVENT_NETWORK_INFO_CHANGED, going from \w+ to CONNECTED'
    set:
      connected: true
      network_type: $1

  - name: Network Disconnected
    filter:
      tag: ConnectivityService
      message_regex: '\[\d+ (\w+)\] EVENT_NETWORK_INFO_CHANGED, going from \w+ to DISCONNECTED'
    set:
      connected: false
    clear:
      - network_type

  # Legacy Android (pre-6) — NetworkStateTracker / ConnectivityService
  # Format: type: WIFI[], state: CONNECTED/CONNECTED

  - name: Network Connected (Legacy)
    filter:
      tag: ConnectivityService
      message_regex: 'type: (\w+).*state: CONNECTED/CONNECTED'
    set:
      connected: true
      network_type: $1

  - name: Network Disconnected (Legacy)
    filter:
      tag: ConnectivityService
      message_regex: 'type: (\w+).*state: DISCONNECTED/DISCONNECTED'
    set:
      connected: false
    clear:
      - network_type

output:
  timeline: true
  annotate: true

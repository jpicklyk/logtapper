type: state_tracker
id: __wifi_state
name: WiFi State
version: 1.1.0
author: LogTapper
description: "Tracks WiFi connection state throughout the log: enabled/disabled, SSID, signal strength, and IP address. Supports AOSP (WifiStateMachine) and Samsung (SemClientModeImpl) devices."
tags: [network, wifi, android]
builtin: true

group: Network

state:
  - name: enabled
    type: bool
    default: false
  - name: ssid
    type: string
    default: ""
  - name: signal_dbm
    type: int
    default: 0
  - name: ip_address
    type: string
    default: ""

transitions:
  # ── AOSP / Pixel ──────────────────────────────────────────────────────────

  - name: WiFi Enabled
    filter:
      tag: WifiStateMachine
      message_contains: CMD_ENABLE_NETWORK
    set:
      enabled: true

  - name: WiFi Associated
    filter:
      tag: WifiStateMachine
      message_regex: 'ssid=([^\s,]+)'
    set:
      ssid: $1

  - name: WiFi Connected
    filter:
      tag: WifiInfo
      message_regex: 'SSID=([^\s,]+).*SignalLevel=(-?\d+)'
    set:
      ssid: $1
      signal_dbm: $2

  - name: IP Assigned
    filter:
      tag: DhcpClient
      message_regex: 'Confirmed new address (\d+\.\d+\.\d+\.\d+)'
    set:
      ip_address: $1

  - name: WiFi Disabled
    filter:
      tag: WifiStateMachine
      message_contains: CMD_DISABLE_NETWORK
    set:
      enabled: false
    clear:
      - ssid
      - signal_dbm
      - ip_address

  - name: WiFi Disconnected
    filter:
      tag: WifiStateMachine
      message_contains: DISCONNECTING
    set:
      ssid: ""
    clear:
      - ip_address

  # ── Samsung (SemClientModeImpl / SemRoamingAssistant) ────────────────────

  - name: WiFi Disconnected
    filter:
      tag_regex: 'SemClientModeImpl'
      message_contains: "entering DisconnectedState"
    set:
      enabled: false
      ssid: ""
    clear:
      - ip_address
      - signal_dbm

  - name: WiFi Connecting
    filter:
      tag_regex: 'SemClientModeImpl'
      message_contains: "Leaving Disconnected state"
    set:
      enabled: true

  - name: WiFi L2 Connected
    filter:
      tag_regex: 'SemClientModeImpl'
      message_contains: "entering L2ConnectedState"
    set:
      enabled: true

  - name: WiFi Connected
    filter:
      tag_regex: 'SemClientModeImpl'
      message_contains: "entering ConnectedState"
    set:
      enabled: true

  - name: WiFi SSID (Samsung)
    filter:
      tag_regex: 'SemRoamingAssistant'
      message_regex: 'wifiStateChangeEvent\[1\]\["([^"]+)"'
    set:
      ssid: $1

  - name: IP Assigned (Samsung)
    filter:
      tag_regex: 'SemClientModeImpl'
      message_regex: 'ObtainingIp.*?(\d+\.\d+\.\d+\.\d+)'
    set:
      ip_address: $1

output:
  timeline: true
  annotate: true

type: state_tracker
id: charging-state
name: Charging State
version: 1.0.0
author: LogTapper
description: "Tracks how power is being delivered to the device: charge source (AC, USB, wireless, pogo), charge type, charger type, max charging current/voltage, and high-voltage charging (HVC) status. Complements battery-state which tracks what the battery is doing."
tags: [battery, charging, power, android]
category: battery
builtin: false

group: System

state:
  - name: charge_source
    type: string
    default: "none"
  - name: charge_type
    type: int
  - name: charger_type
    type: int
  - name: max_charging_current
    type: int
  - name: max_charging_voltage
    type: int
  - name: hvc
    type: bool

transitions:
  # ── Charging via AC ─────────────────────────────────────────────────────
  - name: Charging via AC
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*ac:true.*charge_type:(\d+).*charger_type:(\d+)'
    set:
      charge_source: ac
      charge_type: "$1"
      charger_type: "$2"

  # ── Charging via USB ────────────────────────────────────────────────────
  - name: Charging via USB
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*usb:true.*charge_type:(\d+).*charger_type:(\d+)'
    set:
      charge_source: usb
      charge_type: "$1"
      charger_type: "$2"

  # ── Charging via Wireless ───────────────────────────────────────────────
  - name: Charging via Wireless
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*wireless:true.*charge_type:(\d+).*charger_type:(\d+)'
    set:
      charge_source: wireless
      charge_type: "$1"
      charger_type: "$2"

  # ── Charging via Pogo ───────────────────────────────────────────────────
  - name: Charging via Pogo
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*pogo:true.*charge_type:(\d+).*charger_type:(\d+)'
    set:
      charge_source: pogo
      charge_type: "$1"
      charger_type: "$2"

  # ── Not charging (all sources false) ────────────────────────────────────
  - name: Not Charging
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*ac:false.*usb:false.*wireless:false.*pogo:false'
    set:
      charge_source: none
      charge_type: 0
      charger_type: 0

  # ── Max charging current/voltage extraction ─────────────────────────────
  - name: Max Charging Current
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*mcc:(\d+).*mcv:(\d+)'
    set:
      max_charging_current: "$1"
      max_charging_voltage: "$2"

  # ── High Voltage Charging flag ──────────────────────────────────────────
  - name: HVC Enabled
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*hvc:true'
    set:
      hvc: true

  - name: HVC Disabled
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*hvc:false'
    set:
      hvc: false

output:
  timeline: true
  annotate: true

schema:
  source_types: ["logcat", "bugreport"]
  emissions: []
  mcp:
    summary:
      template: "Charging: source={{charge_source}}, charge_type={{charge_type}}, charger_type={{charger_type}}, mcc={{max_charging_current}}, mcv={{max_charging_voltage}}, hvc={{hvc}}."
      include_vars: [charge_source, charge_type, charger_type, max_charging_current, max_charging_voltage, hvc]
    signals: []

type: state_tracker
id: charging-state
name: Charging State
version: 1.1.0
author: LogTapper
description: "Tracks how power is being delivered to the device: charge source (AC, USB, wireless, pogo), charge type, charger type, and high-voltage charging (HVC) status. Each transition captures all fields atomically from a single ACTION_BATTERY_CHANGED line."
tags: [battery, charging, power, android]
category: battery
builtin: false

group: System

state:
  - name: charge_source
    type: string
    default: "none"
  - name: charge_type
    type: int
  - name: charger_type
    type: int
  - name: hvc
    type: bool

transitions:
  # Each transition captures charge_type ($1), charger_type ($2) alongside the
  # plug source discriminator. HVC is handled by separate non-competing transitions
  # on the same line format since ps/hvc appear after charger_type.
  #
  # Field order in ACTION_BATTERY_CHANGED:
  #   ...ac:B, usb:B, wireless:B, pogo:B, ..., charge_type:N, charger_type:N,
  #   ..., ps:B, hvc:B, ...

  - name: Charging via AC
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*ac:true.*charge_type:(\d+).*charger_type:(\d+).*hvc:(true|false)'
    set:
      charge_source: ac
      charge_type: "$1"
      charger_type: "$2"
      hvc: "$3"

  - name: Charging via USB
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*usb:true.*charge_type:(\d+).*charger_type:(\d+).*hvc:(true|false)'
    set:
      charge_source: usb
      charge_type: "$1"
      charger_type: "$2"
      hvc: "$3"

  - name: Charging via Wireless
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*wireless:true.*charge_type:(\d+).*charger_type:(\d+).*hvc:(true|false)'
    set:
      charge_source: wireless
      charge_type: "$1"
      charger_type: "$2"
      hvc: "$3"

  - name: Charging via Pogo
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*pogo:true.*charge_type:(\d+).*charger_type:(\d+).*hvc:(true|false)'
    set:
      charge_source: pogo
      charge_type: "$1"
      charger_type: "$2"
      hvc: "$3"

  # ── Not charging (all sources false) ──────────────────────────────────────
  - name: Not Charging
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*ac:false.*usb:false.*wireless:false.*pogo:false'
    set:
      charge_source: none
      charge_type: 0
      charger_type: 0
      hvc: false

  # ── Fallback: capture charge_type/charger_type without hvc ────────────────
  - name: Charging Update (no HVC field)
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*charge_type:(\d+).*charger_type:(\d+)'
    set:
      charge_type: "$1"
      charger_type: "$2"

output:
  timeline: true
  annotate: true

schema:
  source_types: ["logcat", "bugreport"]
  emissions: []
  mcp:
    summary:
      template: "Charging: source={{charge_source}}, charge_type={{charge_type}}, charger_type={{charger_type}}, hvc={{hvc}}."
      include_vars: [charge_source, charge_type, charger_type, hvc]
    signals: []

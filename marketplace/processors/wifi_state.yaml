type: state_tracker
id: wifi-state
name: WiFi State
version: 1.3.0
author: LogTapper
description: "Tracks WiFi connection state throughout the log: enabled/disabled, SSID, signal strength, and IP address. Supports AOSP (WifiStateMachine) and Samsung (SemWifiApAdvancedAutohotspotService) devices."
tags: [network, wifi, android]
builtin: false

group: Network

state:
  - name: enabled
    type: bool
  - name: ssid
    type: string
  - name: signal_dbm
    type: int
  - name: ip_address
    type: string

transitions:
  # ── AOSP / Pixel ──────────────────────────────────────────────────────────

  - name: WiFi Enabled
    filter:
      tag: WifiStateMachine
      message_contains: CMD_ENABLE_NETWORK
    set:
      enabled: true

  - name: WiFi Associated
    filter:
      tag: WifiStateMachine
      message_regex: 'ssid=([^\s,]+)'
    set:
      ssid: $1

  - name: WiFi Connected
    filter:
      tag: WifiInfo
      message_regex: 'SSID=([^\s,]+).*SignalLevel=(-?\d+)'
    set:
      ssid: $1
      signal_dbm: $2

  - name: IP Assigned
    filter:
      tag: DhcpClient
      message_regex: 'Confirmed new address (\d+\.\d+\.\d+\.\d+)'
    set:
      ip_address: $1

  - name: WiFi Disabled
    filter:
      tag: WifiStateMachine
      message_contains: CMD_DISABLE_NETWORK
    set:
      enabled: false
    clear:
      - ssid
      - signal_dbm
      - ip_address

  - name: WiFi Disconnected
    filter:
      tag: WifiStateMachine
      message_contains: DISCONNECTING
    set:
      ssid: ""
    clear:
      - ip_address

  # ── Samsung (SemWifiApAdvancedAutohotspotService / SemRoamingAssistant) ──────
  # Uses high-level CMD events — clean, one event per state change.

  - name: WiFi Disabled (Samsung)
    filter:
      tag: SemWifiApAdvancedAutohotspotService
      message_contains: "CMD_WIFI_OFF"
    set:
      enabled: false
    clear:
      - ssid
      - signal_dbm
      - ip_address

  - name: WiFi Enabled (Samsung)
    filter:
      tag: SemWifiApAdvancedAutohotspotService
      message_contains: "CMD_WIFI_ON"
    set:
      enabled: true

  - name: WiFi Disconnected (Samsung)
    filter:
      tag: SemWifiApAdvancedAutohotspotService
      message_contains: "CMD_WIFI_DISCONNECTED"
    set:
      ssid: ""
    clear:
      - signal_dbm
      - ip_address

  - name: WiFi Connected (Samsung)
    filter:
      tag: SemWifiApAdvancedAutohotspotService
      message_contains: "CMD_WIFI_CONNECTED"
    set:
      enabled: true

  - name: WiFi SSID (Samsung)
    filter:
      tag_regex: 'SemRoamingAssistant'
      message_regex: 'wifiStateChangeEvent\[1\]\["([^"]+)"'
    set:
      ssid: $1

  - name: IP + Signal Connected (Samsung)
    filter:
      tag: ConnectivityService
      message_regex: 'IP: /(\d+\.\d+\.\d+\.\d+).*RSSI: (-?\d+)'
    set:
      ip_address: $1
      signal_dbm: $2

  - name: Signal Update (Samsung)
    filter:
      tag_regex: 'SemIWCMonitor'
      message_regex: 'RSSI:(-?\d+)'
    set:
      signal_dbm: $1

output:
  timeline: true
  annotate: true

schema:
  source_types: ["logcat"]
  emissions: []
  mcp:
    summary:
      template: "WiFi state tracker: monitors enabled/disabled, SSID, signal strength, and IP address across AOSP and Samsung devices."
      include_vars: []
    signals: []

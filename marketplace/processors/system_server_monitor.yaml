meta:
  id: "system-server-monitor"
  name: "System Server Monitor"
  version: "1.0.0"
  author: "LogTapper"
  description: >
    Monitors Android system_server health via Watchdog !@Sync messages.
    Tracks both Java heap pressure (5-level classification from normal to critical)
    and file descriptor usage (normal/elevated/critical states with boot spike detection).
    Critical heap or FD levels often precede system_server restart or device reboot.
  tags: ["memory", "heap", "fd", "file-descriptor", "system_server", "watchdog", "oom", "leak", "android"]
  category: memory

# Watchdog telemetry appears in SYSTEM LOG (live) and DUMPSYS NORMAL (bugreport dumps)
sections:
  - "SYSTEM LOG"
  - "DUMPSYS NORMAL"

vars:
  # ── Heap tracking ──
  - name: sample_count
    type: int
    default: 0
    display: true
    label: "Samples"

  - name: peak_heap_used
    type: int
    default: 0
    display: true
    label: "Peak Heap Used (MB)"

  - name: peak_heap_pct
    type: int
    default: 0
    display: true
    label: "Peak Heap %"

  - name: high_pressure_count
    type: int
    default: 0
    display: true
    label: "High Pressure Events (>80%)"

  - name: critical_pressure_count
    type: int
    default: 0
    display: true
    label: "Critical Pressure Events (>90%)"

  - name: pressure_distribution
    type: map
    default: {}
    display: true
    label: "Heap Pressure Distribution"
    display_as: table
    columns: ["pressure_level", "count"]

  # ── FD tracking ──
  - name: peak_fd_count
    type: int
    default: 0
    display: true
    label: "Peak FD Count"

  - name: boot_fd_spike
    type: int
    default: 0
    display: true
    label: "Boot FD Spike (sync1→sync2 delta)"

  - name: baseline_fd_count
    type: int
    default: 0
    display: true
    label: "Baseline FD Count (sync1)"

  - name: fd_critical_count
    type: int
    default: 0
    display: true
    label: "Critical FD Events (>1000)"

  - name: fd_state_distribution
    type: map
    default: {}
    display: true
    label: "FD State Distribution"
    display_as: table
    columns: ["fd_state", "count"]

pipeline:
  - stage: filter
    rules:
      - type: tag_match
        tags: ["Watchdog"]
      - type: message_contains
        value: "heap(MB):"

  - stage: extract
    fields:
      - name: sync_num
        pattern: '!@Sync[:\s]+(\d+)'
        cast: int
      - name: heap_used
        pattern: 'heap\(MB\):\s*(\d+)\s*/'
        cast: int
      - name: heap_max
        pattern: 'heap\(MB\):\s*\d+\s*/\s*(\d+)'
        cast: int
      - name: fd_count
        pattern: 'FD:\s*(\d+)'
        cast: int

  - stage: script
    runtime: rhai
    src: |
      // Need at least heap data to proceed
      if !("heap_used" in fields) || !("heap_max" in fields) {
        return;
      }
      if fields.heap_max == 0 {
        return;
      }

      vars.sample_count += 1;

      // ── Heap pressure classification ──
      let heap_pct = (fields.heap_used * 100) / fields.heap_max;

      if fields.heap_used > vars.peak_heap_used {
        vars.peak_heap_used = fields.heap_used;
      }
      if heap_pct > vars.peak_heap_pct {
        vars.peak_heap_pct = heap_pct;
      }

      let pressure_level = "normal_<60";
      if heap_pct >= 95 {
        pressure_level = "critical_95+";
      } else if heap_pct >= 90 {
        pressure_level = "high_90-95";
      } else if heap_pct >= 80 {
        pressure_level = "elevated_80-90";
      } else if heap_pct >= 60 {
        pressure_level = "moderate_60-80";
      }

      if heap_pct >= 90 {
        vars.critical_pressure_count += 1;
      } else if heap_pct >= 80 {
        vars.high_pressure_count += 1;
      }

      let pd = vars.pressure_distribution;
      if pressure_level in pd {
        pd[pressure_level] = pd[pressure_level] + 1;
      } else {
        pd[pressure_level] = 1;
      }
      vars.pressure_distribution = pd;

      // ── FD state classification ──
      let fd = if "fd_count" in fields { fields.fd_count } else { 0 };
      let fd_state = "normal";

      if fd > 0 {
        if fd > 1000 {
          fd_state = "critical";
          vars.fd_critical_count += 1;
        } else if fd >= 500 {
          fd_state = "elevated";
        }

        if fd > vars.peak_fd_count {
          vars.peak_fd_count = fd;
        }

        // Boot spike detection: capture sync1 as baseline, sync2-sync1 as spike
        if "sync_num" in fields {
          let sn = fields.sync_num;
          if sn == 1 && vars.baseline_fd_count == 0 {
            vars.baseline_fd_count = fd;
          } else if sn == 2 && vars.baseline_fd_count > 0 && vars.boot_fd_spike == 0 {
            let delta = fd - vars.baseline_fd_count;
            if delta > 0 {
              vars.boot_fd_spike = delta;
            }
          }
        }

        let dist = vars.fd_state_distribution;
        if fd_state in dist {
          dist[fd_state] = dist[fd_state] + 1;
        } else {
          dist[fd_state] = 1;
        }
        vars.fd_state_distribution = dist;
      }

      _emits.push(#{
        heap_used: fields.heap_used,
        heap_max: fields.heap_max,
        heap_pct: heap_pct,
        pressure_level: pressure_level,
        fd_count: fd,
        fd_state: fd_state,
        sync_num: if "sync_num" in fields { fields.sync_num } else { 0 },
      });

  - stage: output
    views:
      - type: table
        source: emissions
        columns: ["heap_used", "heap_max", "heap_pct", "pressure_level", "fd_count", "fd_state", "sync_num"]
        sort: "heap_pct"
      - type: summary
        source: vars
        template: |
          {{sample_count}} samples. Heap peak: {{peak_heap_used}} MB ({{peak_heap_pct}}%). High pressure (>80%): {{high_pressure_count}} | Critical (>90%): {{critical_pressure_count}}.
          FD peak: {{peak_fd_count}}. Critical (>1000): {{fd_critical_count}}. Boot spike: {{boot_fd_spike}} FDs.

    charts:
      - id: heap_timeline
        type: time_series
        title: "System Server Heap Usage Over Time"
        source: emissions
        x: { field: timestamp, label: "Time" }
        y: { field: heap_pct, label: "Heap %" }
        timeline: { field: heap_pct, color: "#3fb950", label: "Heap %" }

      - id: fd_timeline
        type: time_series
        title: "System Server FD Count Over Time"
        source: emissions
        x: { field: timestamp, label: "Time" }
        y: { field: fd_count, label: "FD Count" }
        timeline: { field: fd_count, color: "#58a6ff", label: "FD Count" }

      - id: pressure_bar
        type: bar
        title: "Heap Pressure Distribution"
        source: emissions
        x: { field: pressure_level, label: "Pressure Level" }
        y: { field: pressure_level, label: "Count", aggregation: count }

      - id: fd_state_bar
        type: bar
        title: "FD State Distribution"
        source: emissions
        x: { field: fd_state, label: "FD State" }
        y: { field: fd_state, label: "Count", aggregation: count }

schema:
  source_types: ["logcat", "bugreport"]
  emissions:
    - name: heap_used
      type: int
      description: "Heap memory used in MB"
    - name: heap_max
      type: int
      description: "Maximum heap size in MB"
    - name: heap_pct
      type: int
      description: "Heap usage as percentage (0-100)"
    - name: pressure_level
      type: string
      description: "Classified pressure level (normal_<60, moderate_60-80, elevated_80-90, high_90-95, critical_95+)"
    - name: fd_count
      type: int
      description: "File descriptor count from the same Watchdog message"
    - name: fd_state
      type: string
      description: "Classified FD state (normal, elevated, critical)"
    - name: sync_num
      type: int
      description: "Watchdog sync number (1=first sync after boot, 2=second, etc.)"
  mcp:
    summary:
      template: "{{sample_count}} samples. Heap peak: {{peak_heap_used}} MB ({{peak_heap_pct}}%). High pressure: {{high_pressure_count}}. Critical: {{critical_pressure_count}}. FD peak: {{peak_fd_count}}. FD critical: {{fd_critical_count}}. Boot spike: {{boot_fd_spike}}."
      include_vars: [sample_count, peak_heap_used, peak_heap_pct, high_pressure_count, critical_pressure_count, peak_fd_count, fd_critical_count, boot_fd_spike]
    signals:
      - name: heap_critical
        severity: critical
        condition: "heap_pct >= 90"
        fields: [heap_used, heap_max, heap_pct, pressure_level]
        format: "Critical heap pressure: {{heap_pct}}% ({{heap_used}}MB/{{heap_max}}MB)"
        type: emission
      - name: heap_high
        severity: warning
        condition: "heap_pct >= 80"
        fields: [heap_used, heap_max, heap_pct, pressure_level]
        format: "High heap pressure: {{heap_pct}}% ({{heap_used}}MB/{{heap_max}}MB)"
        type: emission
      - name: fd_critical
        severity: critical
        condition: "fd_count > 1000"
        fields: [fd_count, fd_state, sync_num]
        format: "Critical FD count: {{fd_count}} file descriptors in system_server"
        type: emission
      - name: fd_elevated
        severity: warning
        condition: "fd_count >= 500"
        fields: [fd_count, fd_state, sync_num]
        format: "Elevated FD count: {{fd_count}} file descriptors in system_server"
        type: emission

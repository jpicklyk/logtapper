type: state_tracker
id: wlan-disconnect-tracker
name: WLAN Disconnect Tracker
version: 1.5.2
author: LogTapper
description: "Tracks WiFi connection state with focus on disconnection events. Captures IEEE 802.11 reason codes, locally-generated flags, and BSSID from wpa_supplicant CTRL-EVENT logcat messages and WifiClientModeImpl/SemClientModeImpl state logs. Scopes the bugreport NETWORK_DISCONNECTION_EVENT transitions to the dumpsys wifi section to avoid cross-section duplication."
tags: [wifi, network, wlan, disconnect, android]
category: network

group: Network

# The per-tracker range gate (pipeline_core.rs) is the union of these names and
# every transition's `filter.section`. Without SYSTEM LOG here the whole tracker
# is confined to the dumpsys ranges and none of the logcat transitions below can
# fire on a bugreport.
sections:
  - "SYSTEM LOG"
  - "DUMPSYS NORMAL"

state:
  - name: connection_state
    type: string
    default: "unknown"
  - name: last_reason
    type: string
    default: ""
  - name: locally_generated
    type: string
    default: ""
  - name: bssid
    type: string
    default: ""

transitions:
  # ── wpa_supplicant CTRL-EVENT logcat messages ──────────────────────────────
  # These are the most reliable source: tagged logcat entries from the
  # wpa_supplicant daemon, available in both ADB streams and bugreports.
  # Most-specific patterns first (locally_generated=1/0 before generic).

  - name: Disconnected (local, wpa_supplicant)
    filter:
      message_regex: 'CTRL-EVENT-DISCONNECTED bssid=([0-9a-fA-F:]{17}).*locally_generated=1'
    set:
      connection_state: "disconnecting"
      bssid: $1
      locally_generated: "yes"

  - name: Disconnected (remote, wpa_supplicant)
    filter:
      message_regex: 'CTRL-EVENT-DISCONNECTED bssid=([0-9a-fA-F:]{17}).*locally_generated=0'
    set:
      connection_state: "disconnecting"
      bssid: $1
      locally_generated: "no"

  - name: Disconnected (wpa_supplicant, no LG)
    filter:
      message_regex: 'CTRL-EVENT-DISCONNECTED bssid=([0-9a-fA-F:]{17})'
    set:
      connection_state: "disconnecting"
      bssid: $1

  - name: Connected (wpa_supplicant)
    filter:
      message_regex: 'CTRL-EVENT-CONNECTED.*([0-9a-fA-F:]{17})'
    set:
      connection_state: "connected"
      bssid: $1
      last_reason: ""
      locally_generated: ""

  # ── IEEE 802.11 reason codes — most-specific first ────────────────────────
  # Samsung HDD driver format: "WLAN_REASON_DEAUTH_LEAVING vendor: 0  LG: 1"
  # Note: "LG: 1" has a space after the colon.

  - name: Deauth (local, named reason)
    filter:
      message_regex: 'WLAN_REASON_(\w+).*LG: 1'
    set:
      connection_state: "disconnecting"
      last_reason: $1
      locally_generated: "yes"

  - name: Deauth (remote, named reason)
    filter:
      message_regex: 'WLAN_REASON_(\w+).*LG: 0'
    set:
      connection_state: "disconnecting"
      last_reason: $1
      locally_generated: "no"

  - name: Deauth (named reason, no LG)
    filter:
      message_regex: 'WLAN_REASON_(\w+)'
    set:
      connection_state: "disconnecting"
      last_reason: $1

  - name: Deauth (numeric reason)
    filter:
      message_regex: '[Dd]isconnect reason[=: ]+(\d+)'
    set:
      connection_state: "disconnecting"
      last_reason: $1

  # ── State machine transitions ──────────────────────────────────────────────

  - name: Disconnected (AOSP)
    filter:
      tag: WifiClientModeImpl
      message_regex: '(?i)disconnectedstate.enter'
    set:
      connection_state: "disconnected"

  - name: Disconnected (Samsung)
    filter:
      tag: SemClientModeImpl
      message_regex: '(?i)disconnectedstate.enter'
    set:
      connection_state: "disconnected"

  # ── Bugreport WifiStateMachine dump: NETWORK_DISCONNECTION_EVENT ──────────
  # Most-specific first (with locallyGenerated), then generic fallback.
  #
  # `filter.section` matches the INNERMOST section name (section_for_line), so
  # these must name the `wifi` dumpsys subsection, not its DUMPSYS NORMAL parent
  # — a parent name here matches only lines between subsections, i.e. never.
  # UNVERIFIED: no NETWORK_DISCONNECTION_EVENT line was available to test against.

  - name: Disconnected (network event, local)
    filter:
      section: "wifi"
      message_regex: 'NETWORK_DISCONNECTION_EVENT.*bssid:\s*([0-9a-fA-F:]{17}).*reasonCode:\s*(\d+).*locallyGenerated:\s*true'
    set:
      connection_state: "disconnected"
      bssid: $1
      last_reason: $2
      locally_generated: "yes"

  - name: Disconnected (network event, remote)
    filter:
      section: "wifi"
      message_regex: 'NETWORK_DISCONNECTION_EVENT.*bssid:\s*([0-9a-fA-F:]{17}).*reasonCode:\s*(\d+).*locallyGenerated:\s*false'
    set:
      connection_state: "disconnected"
      bssid: $1
      last_reason: $2
      locally_generated: "no"

  - name: Disconnected (network event)
    filter:
      section: "wifi"
      message_contains: "NETWORK_DISCONNECTION_EVENT"
    set:
      connection_state: "disconnected"

  - name: Disconnected (Samsung high-level)
    filter:
      tag: SemWifiApAdvancedAutohotspotService
      message_contains: "CMD_WIFI_DISCONNECTED"
    set:
      connection_state: "disconnected"
      last_reason: ""
      locally_generated: ""

  # ── Reconnect attempt ──────────────────────────────────────────────────────

  - name: Connecting (AOSP)
    filter:
      tag: WifiClientModeImpl
      message_contains: "CMD_START_CONNECT"
    set:
      connection_state: "connecting"

  - name: Connecting (Samsung)
    filter:
      tag: SemClientModeImpl
      message_contains: "CMD_START_CONNECT"
    set:
      connection_state: "connecting"

  # ── L2 connected (fallback if wpa_supplicant CTRL-EVENT not present) ───────

  - name: L2 Connected (AOSP)
    filter:
      tag: WifiClientModeImpl
      message_regex: '(?i)l2connectedstate.enter'
    set:
      connection_state: "connected"
      last_reason: ""
      locally_generated: ""

  - name: L2 Connected (Samsung)
    filter:
      tag: SemClientModeImpl
      message_regex: '(?i)l2connectedstate.enter'
    set:
      connection_state: "connected"
      last_reason: ""
      locally_generated: ""

  - name: Connected (Samsung high-level)
    filter:
      tag: SemWifiApAdvancedAutohotspotService
      message_contains: "CMD_WIFI_CONNECTED"
    set:
      connection_state: "connected"

output:
  timeline: true
  annotate: true

schema:
  source_types: ["logcat", "bugreport"]
  emissions: []
  mcp:
    summary:
      template: "WLAN disconnect tracker: monitors WiFi connection state with IEEE 802.11 reason codes and locally-generated flags from wpa_supplicant and state machine logs."
      include_vars: []
    signals: []

meta:
  id: "wlan-disconnect-events"
  name: "WLAN Disconnect Events"
  version: "1.5.1"
  author: "LogTapper"
  description: "Captures WiFi disconnection events from bugreport WifiStateMachine dumps and live logcat. Extracts IEEE 802.11 reason codes, locally-generated flags, BSSID, and SSID. Section filtering restricts bugreport processing to SYSTEM LOG and DUMPSYS NORMAL; content-based dedup skips compact/metrics duplicates within those sections."
  tags: ["wifi", "network", "wlan", "disconnect", "android"]
  category: network

# Restrict bugreport processing to sections where WLAN disconnect data lives:
# - SYSTEM LOG: logcat entries with CTRL-EVENT-DISCONNECTED (wpa_supplicant)
# - DUMPSYS NORMAL: WifiStateMachine rec[] dumps with NETWORK_DISCONNECTION_EVENT
# The Rhai guard further deduplicates within DUMPSYS NORMAL by skipping compact/metrics
# format lines that lack reasonCode/locallyGenerated fields.
# For pure logcat files (no sections), this is a no-op and all lines are processed.
sections:
  - "SYSTEM LOG"
  - "DUMPSYS NORMAL"

vars:
  - name: total_disconnects
    type: int
    default: 0
    display: true
    label: "Total Disconnects"

  - name: locally_generated
    type: int
    default: 0
    display: true
    label: "Locally Generated"

  - name: remote_deauth
    type: int
    default: 0
    display: true
    label: "Remote Deauth"

  - name: reason_counts
    type: map
    default: {}
    display: true
    label: "Reason Codes"
    display_as: table
    columns: ["reason", "count"]

  - name: event_type_counts
    type: map
    default: {}
    display: true
    label: "Event Types"
    display_as: table
    columns: ["event_type", "count"]

pipeline:
  - stage: filter
    rules:
      - type: message_contains_any
        values:
          # === Live logcat markers (ADB streaming) ===
          # wpa_supplicant CTRL-EVENT
          - "CTRL-EVENT-DISCONNECTED"
          # Samsung HDD driver / kernel
          - "WLAN_REASON_"
          # Kernel deauth
          - "wlan0: deauthenticating"

          # === Bugreport: WifiStateMachine dump only ===
          # This is the richest format: has SSID, BSSID, reasonCode, locallyGenerated
          # Other bugreport sections (WifiMetrics, SemClientModeImpl, framework)
          # are intentionally excluded to avoid counting the same event multiple times.
          - "NETWORK_DISCONNECTION_EVENT"

  - stage: extract
    fields:
      # Samsung kernel driver reason codes (e.g. WLAN_REASON_DEAUTH_LEAVING)
      - name: reason_code
        pattern: 'WLAN_REASON_(\w+)'
        cast: string
      # Numeric reason from WifiStateMachine dump (reasonCode: 47) or logcat
      - name: reason_num
        pattern: 'reasonCode[=:\s]+(\d+)'
        cast: int
      # wpa_supplicant reason (reason=47)
      - name: reason_wpa
        pattern: 'reason=(\d+)(?:\s|$)'
        cast: int
      # LG flag from wpa_supplicant (LG=1 or LG=0)
      - name: lg_flag
        pattern: 'LG[=: ]+(\d)'
        cast: int
      # locallyGenerated from WifiStateMachine dump
      - name: lg_bool
        pattern: 'locallyGenerated[=:\s]+(true|false)'
        cast: string
      - name: bssid
        pattern: 'bssid[=:\s]+([0-9a-fA-F:]{17})'
        cast: string
      - name: ssid
        pattern: 'ssid[=:\s]+"?([^"\s,]+)'
        cast: string

  - stage: script
    runtime: rhai
    src: |
      let msg = line.message;

      // Guard: NETWORK_DISCONNECTION_EVENT lines from non-WifiStateMachine sections
      // lack reasonCode/locallyGenerated — skip them to avoid duplicates.
      if "NETWORK_DISCONNECTION_EVENT" in msg {
        if !("reason_num" in fields) && !("lg_bool" in fields) {
          return;
        }
      }

      // Classify event type based on source marker
      let event_type = "disconnect";
      if "deauthenticating" in msg || "WLAN_REASON_" in msg {
        event_type = "deauth";
      }

      vars.total_disconnects += 1;

      // Resolve locally-generated flag from multiple formats
      let is_local = -1;
      if "lg_flag" in fields {
        is_local = fields.lg_flag;
      } else if "lg_bool" in fields {
        is_local = if fields.lg_bool == "true" { 1 } else { 0 };
      }

      if is_local == 1 {
        vars.locally_generated += 1;
      } else if is_local == 0 {
        vars.remote_deauth += 1;
      }

      // Build reason label — normalize to numeric code
      let reason = "unknown";
      if "reason_code" in fields {
        // Kernel driver: DEAUTH_LEAVING, etc.
        reason = fields.reason_code;
      } else if "reason_num" in fields {
        reason = fields.reason_num.to_string();
      } else if "reason_wpa" in fields {
        reason = fields.reason_wpa.to_string();
      }

      // Count by reason code
      if reason != "unknown" {
        let m = vars.reason_counts;
        if reason in m { m[reason] = m[reason] + 1; } else { m[reason] = 1; }
        vars.reason_counts = m;
      }

      // Count by event type
      let et = vars.event_type_counts;
      if event_type in et { et[event_type] = et[event_type] + 1; } else { et[event_type] = 1; }
      vars.event_type_counts = et;

      let bssid = if "bssid" in fields { fields.bssid } else { "unknown" };
      let ssid  = if "ssid"  in fields { fields.ssid  } else { "unknown" };

      _emits.push(#{
        event_type: event_type,
        reason: reason,
        lg: is_local,
        bssid: bssid,
        ssid: ssid,
        tag: line.tag,
      });

  - stage: output
    views:
      - type: table
        source: emissions
        columns: ["event_type", "reason", "lg", "ssid", "bssid", "tag"]
        sort: "event_type"
      - type: summary
        source: vars
        template: |
          {{total_disconnects}} disconnect events.
          Locally generated: {{locally_generated}} | Remote deauth: {{remote_deauth}}

    charts:
      - id: event_type_bar
        type: bar
        title: "Disconnect Events by Type"
        source: emissions
        x: { field: event_type, label: "Event Type" }
        y: { field: event_type, label: "Count", aggregation: count }

      - id: reason_bar
        type: bar
        title: "Disconnect Reasons (IEEE 802.11)"
        source: emissions
        x: { field: reason, label: "Reason" }
        y: { field: reason, label: "Count", aggregation: count }

      - id: timeline
        type: time_series
        title: "Disconnect Events Over Time"
        source: emissions
        x: { field: timestamp, label: "Time" }
        y: { field: event_type, label: "Events", aggregation: count }

schema:
  source_types: ["logcat", "bugreport"]
  emissions:
    - name: event_type
      type: string
      description: "Classified event type (disconnect, deauth)"
    - name: reason
      type: string
      description: "IEEE 802.11 reason code or numeric code label"
    - name: lg
      type: int
      description: "Locally-generated flag (1=local, 0=remote, -1=unknown)"
    - name: bssid
      type: string
      description: "BSSID of the access point"
    - name: ssid
      type: string
      description: "SSID of the WiFi network"
    - name: tag
      type: string
      description: "Log tag from the source line"
  mcp:
    summary:
      template: "{{total_disconnects}} disconnect events. Locally generated: {{locally_generated}}. Remote deauth: {{remote_deauth}}."
      include_vars: [total_disconnects, locally_generated, remote_deauth]
    signals:
      - name: frequent_disconnects
        severity: warning
        condition: "total_disconnects > 20"
        fields: [total_disconnects, locally_generated, remote_deauth]
        format: "{{total_disconnects}} WiFi disconnect events detected — possible connectivity instability"
        type: aggregate
      - name: remote_deauth_detected
        severity: warning
        condition: "remote_deauth > 0"
        fields: [remote_deauth]
        format: "{{remote_deauth}} remote deauthentication(s) detected — AP is actively disconnecting client"
        type: aggregate

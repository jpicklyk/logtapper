type: state_tracker
id: app-lifecycle
name: App Lifecycle
version: 1.0.0
author: LogTapper
description: Tracks foreground app changes, activity launches, and crashes via ActivityManager.
tags: [app, lifecycle, android]
builtin: false

group: App

state:
  - name: foreground_app
    type: string
  - name: foreground_activity
    type: string
  - name: last_crash
    type: string
  - name: crashed
    type: bool

transitions:
  - name: Activity Started
    filter:
      tag: ActivityManager
      message_regex: 'START.*cmp=([^\s/]+)/([^\s]+)'
    set:
      foreground_app: $1
      foreground_activity: $2
      crashed: false

  - name: App Crashed
    filter:
      tag: ActivityManager
      message_regex: 'Process ([^\s]+) \(pid \d+\) has died'
    set:
      last_crash: $1
      crashed: true

  - name: ANR Detected
    filter:
      tag: ActivityManager
      message_regex: 'ANR in ([^\s]+)'
    set:
      last_crash: $1
      crashed: true

  - name: App Resumed
    filter:
      tag: ActivityManager
      message_regex: 'Displayed ([^\s/]+)/([^\s:]+)'
    set:
      foreground_app: $1
      foreground_activity: $2
      crashed: false

output:
  timeline: true
  annotate: true

schema:
  source_types: ["logcat"]
  emissions: []
  mcp:
    summary:
      template: "App lifecycle tracker: monitors foreground app changes, activity launches, and crashes via ActivityManager."
      include_vars: []
    signals: []

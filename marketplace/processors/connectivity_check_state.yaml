type: state_tracker
id: connectivity-check-state
name: Connectivity Check State
version: 1.1.3
author: LogTapper
description: >
  Tracks Android NetworkMonitor validation lifecycle per network.
  Monitors probe-level DNS failures, HTTP/HTTPS probe outcomes,
  and the final isCaptivePortal verdict (validated / failed / portal / partial).
  Complements the built-in Network Connectivity tracker which only sees
  ConnectivityService CONNECTED/DISCONNECTED — this tracker shows *why*
  a network isn't validating (DNS timeout, HTTP blocked, captive portal, etc.).
tags: [network, connectivity, dns, android]
category: network

group: Network

sections:
  - "SYSTEM LOG"

state:
  - name: validation_state
    type: string
    default: "unknown"
  - name: network_id
    type: string
  - name: dns_ok
    type: bool
  - name: http_ok
    type: bool
  - name: https_ok
    type: bool
  - name: is_portal
    type: bool
  - name: partial_connectivity
    type: bool
  - name: validation_time_ms
    type: string
  - name: last_dns_failure
    type: string
  - name: redirect_url
    type: string

transitions:
  # ── isCaptivePortal verdict lines (most definitive — order matters) ──
  # tag_regex $1 = network ID, message_regex captures start at $2.

  - name: Validated
    filter:
      tag_regex: 'NetworkMonitor/(\d+)'
      message_contains: "isSuccessful()=true"
    set:
      validation_state: "validated"
      network_id: $1
      dns_ok: true
      http_ok: true
      https_ok: true
      is_portal: false
      partial_connectivity: false
    clear:
      - last_dns_failure
      - redirect_url

  - name: Captive Portal Detected
    filter:
      tag_regex: 'NetworkMonitor/(\d+)'
      message_regex: 'isPortal\(\)=true.*RedirectUrl=(\S+)'
    set:
      validation_state: "portal"
      network_id: $1
      is_portal: true
      redirect_url: $2

  - name: Partial Connectivity
    filter:
      tag_regex: 'NetworkMonitor/(\d+)'
      message_contains: "isPartialConnectivity()=true"
    set:
      validation_state: "partial"
      network_id: $1
      partial_connectivity: true
      http_ok: true
      https_ok: false
      is_portal: false

  - name: Validation Failed
    filter:
      tag_regex: 'NetworkMonitor/(\d+)'
      message_regex: 'isCaptivePortal:.*isSuccessful\(\)=false.*isPartialConnectivity\(\)=false.*Time=(\d+)ms'
    set:
      validation_state: "failed"
      network_id: $1
      validation_time_ms: $2

  # ── DNS probe outcomes ──

  - name: DNS Resolved
    filter:
      tag_regex: 'NetworkMonitor/(\d+)'
      message_regex: 'PROBE_DNS \S+ \d+ms OK'
    set:
      dns_ok: true
      network_id: $1
    clear:
      - last_dns_failure

  - name: DNS Failed
    filter:
      tag_regex: 'NetworkMonitor/(\d+)'
      message_regex: 'PROBE_DNS (\S+) \d+ms FAIL'
    set:
      dns_ok: false
      network_id: $1
      last_dns_failure: $2

  # ── HTTP/HTTPS probe outcomes ──
  # IMPORTANT: HTTPS transitions MUST come before HTTP — first matching
  # transition wins per line, and "PROBE_HTTP" is a prefix of "PROBE_HTTPS".

  - name: HTTPS Probe OK
    filter:
      tag_regex: 'NetworkMonitor/(\d+)'
      message_regex: 'PROBE_HTTPS \S+ time=\d+ms ret=204'
    set:
      https_ok: true
      network_id: $1

  - name: HTTPS Probe Failed
    filter:
      tag_regex: 'NetworkMonitor/(\d+)'
      message_regex: 'PROBE_HTTPS \S+ Probe failed'
    set:
      https_ok: false
      network_id: $1

  - name: HTTP Probe OK
    filter:
      tag_regex: 'NetworkMonitor/(\d+)'
      message_regex: 'PROBE_(?:HTTP|FALLBACK) \S+ time=\d+ms ret=204'
    set:
      http_ok: true
      network_id: $1

  - name: HTTP Probe Failed
    filter:
      tag_regex: 'NetworkMonitor/(\d+)'
      message_regex: 'PROBE_(?:HTTP|FALLBACK) \S+ Probe failed'
    set:
      http_ok: false
      network_id: $1

output:
  timeline: true
  annotate: true

schema:
  source_types: ["logcat", "bugreport"]
  emissions: []
  mcp:
    summary:
      template: "Connectivity check state tracker: monitors NetworkMonitor validation lifecycle including DNS/HTTP/HTTPS probe outcomes and captive portal detection."
      include_vars: []
    signals: []

meta:
  id: "ims-volte-reporter"
  name: "IMS / VoLTE Bearer Reporter"
  version: "1.0.0"
  author: "LogTapper"
  description: "Tracks IMS bearer setup and teardown events from logcat and bugreport. Extracts state transitions (CONNECTING → CONNECTED → DISCONNECTED), transport type (WWAN/WLAN), network type (LTE, NR), and interface name. Distinguishes 'IMS connected but no internet' situations from full connectivity loss."
  tags: ["ims", "volte", "telephony", "bearer", "rcs", "android"]

# Restrict bugreport processing to sections where IMS/VoLTE bearer events appear.
# SYSTEM LOG: logcat entries from PhoneStateTracker, VolteServiceModule, PdnController
# RADIO LOG: radio-specific logcat with IMS registration state changes
# For pure logcat files (no sections), this is a no-op and all lines are processed.
sections:
  - "SYSTEM LOG"
  - "RADIO LOG"

vars:
  - name: connect_count
    type: int
    default: 0
    display: true
    label: "IMS Connected"

  - name: disconnect_count
    type: int
    default: 0
    display: true
    label: "IMS Disconnected"

  - name: last_state
    type: string
    default: ""
    display: true
    label: "Last IMS State"

  - name: last_transport
    type: string
    default: ""
    display: true
    label: "Last Transport"

  - name: last_network_type
    type: string
    default: ""
    display: true
    label: "Last Network Type"

  - name: transitions_by_state
    type: map
    default: {}
    display: true
    label: "IMS State Transitions"
    display_as: table
    columns: ["state", "count"]

pipeline:
  - stage: filter
    rules:
      - type: message_contains_any
        values:
          # IMS bearer state changes — emitted by PhoneStateTracker, VolteServiceModule, etc.
          - "onPreciseDataConnectionStateChanged"
          # Coarser state change callback used by some OEM layers
          - "onDataConnectionStateChanged"
          # PdnController needNotify lines — fired when data connection state is signalled upward
          - "notifyDataConnectionState: needNotify"
          # IMS registration state events (IMSREGI prefix appears in Samsung IMS components)
          - "IMSREGI"

  - stage: extract
    fields:
      # IMS bearer state from onPreciseDataConnectionStateChanged lines
      - name: ims_state
        pattern: 'state:\s*(CONNECTING|CONNECTED|DISCONNECTED|SUSPENDED|IDLE)'
        cast: string
      # Transport: WWAN = cellular, WLAN = WiFi Calling
      - name: transport
        pattern: 'transport:\s*(WWAN|WLAN)'
        cast: string
      # Network type: LTE, NR, NR_NSA, etc.
      - name: network_type
        pattern: 'network type:\s*([A-Z_0-9]+)'
        cast: string
      # Interface name: rmnet_data0, rmnet_data1, etc.
      - name: iface
        pattern: 'InterfaceName:\s*(\w+)'
        cast: string
      # needNotify flag from PdnController notifyDataConnectionState lines
      - name: notify_needed
        pattern: 'needNotify=(true|false)'
        cast: string
      # networkType numeric code (20 = LTE, etc.) from notifyDataConnectionState lines
      - name: notify_net_type
        pattern: 'networkType=(\d+)'
        cast: int
      # dataRegState numeric code from notifyDataConnectionState lines (0=in service, 1=out)
      - name: data_reg_state
        pattern: 'dataRegState=(\d+)'
        cast: int

  - stage: script
    runtime: rhai
    src: |
      let msg = line.message;

      // --- Branch 1: IMS bearer state change ---
      if "ims_state" in fields {
        let state = fields.ims_state;

        // Update last known values
        vars.last_state = state;
        if "transport" in fields     { vars.last_transport    = fields.transport; }
        if "network_type" in fields  { vars.last_network_type = fields.network_type; }

        // Increment aggregate counters
        if state == "CONNECTED" {
          vars.connect_count += 1;
        } else if state == "DISCONNECTED" {
          vars.disconnect_count += 1;
        }

        // Update per-state transition map (copy → modify → write back)
        let m = vars.transitions_by_state;
        if state in m { m[state] = m[state] + 1; } else { m[state] = 1; }
        vars.transitions_by_state = m;

        let transport    = if "transport"    in fields { fields.transport }    else { "unknown" };
        let network_type = if "network_type" in fields { fields.network_type } else { "unknown" };
        let iface        = if "iface"        in fields { fields.iface }        else { "" };

        _emits.push(#{
          event_type:   "ims_state_change",
          state:        state,
          transport:    transport,
          network_type: network_type,
          iface:        iface,
        });

        return;
      }

      // --- Branch 2: notifyDataConnectionState lines ---
      if "notify_needed" in fields {
        // Only surface lines where needNotify=true — suppressed notifications are noise
        if fields.notify_needed != "true" {
          return;
        }

        let net_type  = if "notify_net_type" in fields { fields.notify_net_type.to_string() } else { "" };
        let reg_state = if "data_reg_state"  in fields { fields.data_reg_state.to_string()  } else { "" };

        _emits.push(#{
          event_type:   "data_connection_notify",
          state:        "",
          transport:    "",
          network_type: net_type,
          iface:        reg_state,
        });
      }

  - stage: output
    views:
      - type: table
        source: emissions
        columns: ["event_type", "state", "transport", "network_type", "iface"]
        sort: "event_type"
      - type: summary
        source: vars
        template: |
          IMS/VoLTE: {{connect_count}} connected, {{disconnect_count}} disconnected.
          Last state: {{last_state}} via {{last_transport}} on {{last_network_type}}.

    charts:
      - id: ims_state_bar
        type: bar
        title: "IMS State Transitions by State"
        source: emissions
        x: { field: state, label: "IMS State" }
        y: { field: state, label: "Count", aggregation: count }
        color: transport

      - id: ims_timeline
        type: time_series
        title: "IMS State Changes Over Time"
        source: emissions
        x: { field: timestamp, label: "Time" }
        y: { field: event_type, label: "Events", aggregation: count }

schema:
  source_types: ["logcat", "bugreport"]
  group: "Telephony"
  emissions:
    - name: event_type
      type: string
      description: "Event class: ims_state_change or data_connection_notify"
    - name: state
      type: string
      description: "IMS bearer state (CONNECTING, CONNECTED, DISCONNECTED, SUSPENDED, IDLE)"
    - name: transport
      type: string
      description: "Transport medium (WWAN = cellular, WLAN = WiFi Calling)"
    - name: network_type
      type: string
      description: "Radio access technology (LTE, NR, NR_NSA, etc.) or numeric networkType code"
    - name: iface
      type: string
      description: "Network interface name (e.g. rmnet_data0) or dataRegState code for notify events"
  mcp:
    summary:
      template: "IMS/VoLTE: {{connect_count}} connected, {{disconnect_count}} disconnected. Last: {{last_state}} via {{last_transport}} on {{last_network_type}}."
      include_vars: [connect_count, disconnect_count, last_state, last_transport, last_network_type]
    signals:
      - name: ims_disconnect
        severity: info
        condition: "disconnect_count > 0"
        fields: [disconnect_count, last_state, last_transport, last_network_type]
        format: "{{disconnect_count}} IMS bearer disconnection(s) detected. Last state: {{last_state}} via {{last_transport}} on {{last_network_type}}."
        type: aggregate

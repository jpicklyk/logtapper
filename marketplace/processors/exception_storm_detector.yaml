meta:
  id: "exception-storm-detector"
  name: "Exception Storm Detector"
  version: "1.1.1"
  author: "LogTapper"
  description: "Detects exception storms — bursts of 20+ identical errors within a 2-second window. Uses the BurstDetector aggregate to fire exactly once per rising edge. Useful for diagnosing recursive failure loops (e.g. 530 identical ServiceNotFoundExceptions/second)."
  tags: ["exception", "error", "storm", "burst", "android", "stability"]

# Only matches logcat entries in the SYSTEM LOG section of bugreports
sections:
  - "SYSTEM LOG"

vars:
  - name: total_errors_seen
    type: int
    default: 0
    display: true
    label: "Total Errors Seen"

pipeline:
  - stage: filter
    rules:
      - type: level_min
        level: E

  - stage: extract
    fields:
      - name: service_not_found
        pattern: 'No service published for:\s+(\w+)'
      - name: exception_class
        pattern: '(\w+(?:Exception|Error))'

  - stage: script
    runtime: rhai
    src: |
      vars.total_errors_seen += 1;

      // Derive burst key: prefer specific service name, then exception class, then log tag
      let key = if fields.service_not_found != () {
        "ServiceNotFound:" + fields.service_not_found
      } else if fields.exception_class != () {
        fields.exception_class
      } else {
        line.tag
      };

      // Write burst_key back into fields so the BurstDetector aggregate can read it
      fields.burst_key = key;

  - stage: aggregate
    groups:
      - type: burst_detector
        field: burst_key
        window_ms: 2000
        threshold: 20

  - stage: output
    views:
      - type: table
        source: emissions
        columns: ["burst_key", "count_in_window", "window_ms"]
        sort: "count_in_window"

schema:
  source_types: ["logcat"]
  emissions:
    - name: burst_key
      type: string
      description: "Identifier for the exception burst (exception class or service name)"
    - name: count_in_window
      type: int
      description: "Number of matching errors within the burst window"
    - name: window_ms
      type: int
      description: "Time window in milliseconds over which the burst was detected"
  mcp:
    summary:
      template: "{{total_errors_seen}} errors scanned for storm patterns."
      include_vars: [total_errors_seen]
    signals:
      - name: exception_storm
        severity: critical
        condition: "count_in_window >= 20"
        fields: [burst_key, count_in_window, window_ms]
        format: "Exception storm: {{count_in_window}} {{burst_key}} errors in {{window_ms}}ms"
        type: emission

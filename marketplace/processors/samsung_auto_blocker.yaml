type: state_tracker
id: samsung-auto-blocker
name: Auto Blocker
version: 1.1.3
author: LogTapper
description: >-
  Tracks Samsung Auto Blocker state. When enabled, blocks USB debugging,
  ADB commands, app sideloading, and developer certificates. Detected from
  live logcat (SecDynamicFragment) and from the settings search index dumped
  under the APP PROVIDERS sections of a dumpstate.
tags: [samsung, security, auto_blocker, usb, adb]
category: security
builtin: false

group: Security

# The per-tracker range gate (pipeline_core.rs) is the union of these names and
# every transition's `filter.section`. SYSTEM LOG must be listed explicitly or
# the SecDynamicFragment transitions below never see a bugreport's logcat lines.
sections:
  - "SYSTEM LOG"

state:
  - name: enabled
    type: bool
  - name: source
    type: string

transitions:
  # ── Logcat: SecDynamicFragment setting state reports ─────────────────────
  # Line format:
  #   I SecDynamicFragment: DynamicMenuData key rampart_main_setting_alias
  #   ,title : Auto Blocker ,summary : ... ,isCheck : false ,isEnable : true

  - name: Auto Blocker On
    filter:
      tag: SecDynamicFragment
      message_regex: 'rampart_main_setting_alias.*isCheck\s*:\s*true'
    set:
      enabled: true
      source: logcat

  - name: Auto Blocker Off
    filter:
      tag: SecDynamicFragment
      message_regex: 'rampart_main_setting_alias.*isCheck\s*:\s*false'
    set:
      enabled: false
      source: logcat

  # ── Dumpstate: settings search index (pipe-delimited) ────────────────────
  # Emitted by `dumpsys activity provider`, which dumpstate files under the
  # APP PROVIDERS sections — NOT under DUMPSYS. Line format:
  #   rampart_main_setting_alias | Auto Blocker | <component> | 1 |
  #
  # Whether the providing app is platform-signed varies by build, so both
  # APP PROVIDERS sections are covered. `filter.section` takes a single exact
  # name, so each case needs its own transition.

  - name: Auto Blocker On (dumpstate, platform)
    filter:
      section: "APP PROVIDERS PLATFORM"
      message_regex: 'rampart_main_setting_alias\s*\|\s*Auto Blocker\s*\|[^|]*\|\s*1\s*\|'
    set:
      enabled: true
      source: dumpstate

  - name: Auto Blocker Off (dumpstate, platform)
    filter:
      section: "APP PROVIDERS PLATFORM"
      message_regex: 'rampart_main_setting_alias\s*\|\s*Auto Blocker\s*\|[^|]*\|\s*0\s*\|'
    set:
      enabled: false
      source: dumpstate

  - name: Auto Blocker On (dumpstate, non-platform)
    filter:
      section: "APP PROVIDERS NON-PLATFORM"
      message_regex: 'rampart_main_setting_alias\s*\|\s*Auto Blocker\s*\|[^|]*\|\s*1\s*\|'
    set:
      enabled: true
      source: dumpstate

  - name: Auto Blocker Off (dumpstate, non-platform)
    filter:
      section: "APP PROVIDERS NON-PLATFORM"
      message_regex: 'rampart_main_setting_alias\s*\|\s*Auto Blocker\s*\|[^|]*\|\s*0\s*\|'
    set:
      enabled: false
      source: dumpstate

output:
  timeline: true
  annotate: true

schema:
  source_types: ["logcat", "bugreport", "dumpstate"]
  emissions: []
  mcp:
    summary:
      template: "Samsung Auto Blocker tracker: monitors enabled/disabled state from logcat and dumpstate sources."
      include_vars: []
    signals: []

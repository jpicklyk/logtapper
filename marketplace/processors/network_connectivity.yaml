type: state_tracker
id: network-connectivity
name: Network Connectivity
version: 3.1.1
author: LogTapper
description: "Tracks network connectivity state: connected/disconnected, network type (WIFI, MOBILE, etc.), and validation status. Supports Android 13+ (validation/capabilities), Android 6-12 (EVENT_NETWORK_INFO_CHANGED), and legacy (pre-6) formats."
tags: [network, connectivity, android]
category: network
builtin: false

group: Network

sections:
  - "SYSTEM LOG"

state:
  - name: connected
    type: bool
  - name: network_type
    type: string
  - name: validated
    type: bool

transitions:
  # Android 13+ — ConnectivityService validation and capabilities
  # These patterns replaced EVENT_NETWORK_INFO_CHANGED in modern AOSP/Samsung

  # Format: [<netId> <TYPE>] validation passed
  - name: Network Validated
    filter:
      tag: ConnectivityService
      message_regex: '\[(\d+) (\w+)\] validation passed'
    set:
      connected: true
      validated: true
      network_type: $2

  # Format: [<netId> <TYPE>] validation failed
  - name: Network Validation Failed
    filter:
      tag: ConnectivityService
      message_regex: '\[(\d+) (\w+)\] validation failed'
    set:
      connected: true
      validated: false
      network_type: $2

  # Format: Update capabilities for net <id> : ...+VALIDATED...
  - name: Network Capabilities Validated
    filter:
      tag: ConnectivityService
      message_regex: 'Update capabilities for net \d+ : .*\+VALIDATED'
    set:
      validated: true

  # Format: Update capabilities for net <id> : ...-VALIDATED...
  - name: Network Capabilities Lost Validation
    filter:
      tag: ConnectivityService
      message_regex: 'Update capabilities for net \d+ : .*-VALIDATED'
    set:
      validated: false

  # Format: Update score for net <id> : +EXITING (network being torn down)
  - name: Network Exiting
    filter:
      tag: ConnectivityService
      message_regex: 'Update score for net \d+ : \+EXITING'
    set:
      connected: false
      validated: false
    clear:
      - network_type

  # Format: Update score for net <id> : -EXITING (network recovered from exit)
  - name: Network Exit Cancelled
    filter:
      tag: ConnectivityService
      message_regex: 'Update score for net \d+ : -EXITING'
    set:
      connected: true

  # Android 6-12 — ConnectivityService EVENT_NETWORK_INFO_CHANGED
  # Format: [<id> <TYPE>] EVENT_NETWORK_INFO_CHANGED, going from <OLD> to <NEW>

  - name: Network Connected
    filter:
      tag: ConnectivityService
      message_regex: '\[\d+ (\w+)\] EVENT_NETWORK_INFO_CHANGED, going from \w+ to CONNECTED'
    set:
      connected: true
      network_type: $1

  - name: Network Disconnected
    filter:
      tag: ConnectivityService
      message_regex: '\[\d+ (\w+)\] EVENT_NETWORK_INFO_CHANGED, going from \w+ to DISCONNECTED'
    set:
      connected: false
    clear:
      - network_type

  # Legacy Android (pre-6) — NetworkStateTracker / ConnectivityService
  # Format: type: WIFI[], state: CONNECTED/CONNECTED

  - name: Network Connected (Legacy)
    filter:
      tag: ConnectivityService
      message_regex: 'type: (\w+).*state: CONNECTED/CONNECTED'
    set:
      connected: true
      network_type: $1

  - name: Network Disconnected (Legacy)
    filter:
      tag: ConnectivityService
      message_regex: 'type: (\w+).*state: DISCONNECTED/DISCONNECTED'
    set:
      connected: false
    clear:
      - network_type

output:
  timeline: true
  annotate: true

schema:
  source_types: ["logcat", "bugreport"]
  emissions: []
  mcp:
    summary:
      template: "Network connectivity tracker: monitors connected/disconnected state, network type, and validation status across Android versions."
      include_vars: []
    signals: []

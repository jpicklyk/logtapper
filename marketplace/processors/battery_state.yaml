type: state_tracker
id: battery-state
name: Battery State
version: 4.0.0
author: LogTapper
description: "Tracks battery level, charging status, plug source, voltage, temperature, current draw, and cycle count from BatteryService ACTION_BATTERY_CHANGED broadcasts. Supports Samsung (named booleans: ac:true/false) and AOSP (plugged=N) formats."
tags: [battery, power, android]
category: battery
builtin: false

group: System

state:
  - name: level
    type: int
  - name: status
    type: string
  - name: charging
    type: bool
  - name: plugged
    type: string
  - name: voltage
    type: int
  - name: temperature
    type: int
  - name: current_avg
    type: int
  - name: cycle_count
    type: int

transitions:
  # ── Samsung format: Sending ACTION_BATTERY_CHANGED with named booleans ───
  # Line: BatteryService: Sending ACTION_BATTERY_CHANGED: level:18, status:3,
  #   health:2, ...ac:false, usb:true, wireless:false, pogo:false, ...
  #   voltage:3515, temperature:248, ...current_avg:-1136, ...cycle_count:0

  - name: Charging via AC
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*level:(\d+).*status:(\d+).*ac:true'
    set:
      level: "$1"
      charging: true
      status: charging
      plugged: ac

  - name: Charging via USB
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*level:(\d+).*status:(\d+).*usb:true'
    set:
      level: "$1"
      charging: true
      status: charging
      plugged: usb

  - name: Charging via Wireless
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*level:(\d+).*status:(\d+).*wireless:true'
    set:
      level: "$1"
      charging: true
      status: charging
      plugged: wireless

  - name: Charging via Pogo
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*level:(\d+).*status:(\d+).*pogo:true'
    set:
      level: "$1"
      charging: true
      status: charging
      plugged: pogo

  # ── Status 3 — Discharging ──────────────────────────────────────────────
  - name: Discharging
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*level:(\d+).*status:3[,\s]'
    set:
      level: "$1"
      charging: false
      status: discharging
      plugged: none

  # ── Status 4 — Not Charging (plugged but not charging) ──────────────────
  - name: Not Charging
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*level:(\d+).*status:4[,\s]'
    set:
      level: "$1"
      charging: false
      status: not_charging

  # ── Status 5 — Full ─────────────────────────────────────────────────────
  - name: Battery Full
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*level:(\d+).*status:5[,\s]'
    set:
      level: "$1"
      charging: false
      status: full

  # ── Voltage / Temperature / Current / Cycle Count extraction ────────────
  # These fire on every ACTION_BATTERY_CHANGED regardless of status.

  - name: Voltage Update
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*voltage:(\d+)'
    set:
      voltage: "$1"

  - name: Temperature Update
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*temperature:(\d+)'
    set:
      temperature: "$1"

  - name: Current Average Update
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*current_avg:(-?\d+)'
    set:
      current_avg: "$1"

  - name: Cycle Count Update
    filter:
      tag: BatteryService
      message_regex: 'Sending ACTION_BATTERY_CHANGED:.*cycle_count:(\d+)'
    set:
      cycle_count: "$1"

  # ── Fallback: processValuesLocked (older format / AOSP) ─────────────────
  - name: Battery Level (fallback)
    filter:
      tag: BatteryService
      message_regex: '\[processValuesLocked\]batteryLevel:(\d+)'
    set:
      level: "$1"

output:
  timeline: true
  annotate: true

schema:
  source_types: ["logcat", "bugreport"]
  emissions: []
  mcp:
    summary:
      template: "Battery: level={{level}}%, status={{status}}, plugged={{plugged}}, voltage={{voltage}}mV, temp={{temperature}} (x0.1C), current={{current_avg}}mA, cycles={{cycle_count}}."
      include_vars: [level, status, plugged, voltage, temperature, current_avg, cycle_count]
    signals: []
